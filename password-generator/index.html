<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Password Generator</title>
<style>
  :root{
    --bg0:#0b0e14; --bg1:#11151f;
    --card:#161b28; --card2:#1c2333;
    --line:rgba(255,255,255,.08);
    --txt:#e8ecf4; --dim:#8b94a7; --faint:#5b6273;
    --acc:#6ea8ff; --acc2:#9b7bff;
    --ok:#3ddc97; --warn:#ffb454; --bad:#ff6b81;
    --mono:ui-monospace,"SF Mono",SFMono-Regular,Menlo,Consolas,monospace;
    --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,Roboto,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html{color-scheme:dark}
  body{
    min-height:100vh; font-family:var(--sans); color:var(--txt);
    background:
      radial-gradient(900px 500px at 15% -10%, rgba(110,168,255,.14), transparent 60%),
      radial-gradient(800px 500px at 95% 0%, rgba(155,123,255,.12), transparent 55%),
      linear-gradient(180deg,var(--bg1),var(--bg0) 60%);
    display:flex; flex-direction:column; align-items:center;
    padding:clamp(16px,4vw,48px) 16px 64px;
  }
  .wrap{width:100%;max-width:640px}
  header{margin-bottom:22px;text-align:left}
  h1{font-size:clamp(24px,5vw,32px);font-weight:700;letter-spacing:-.02em}
  h1 .k{background:linear-gradient(90deg,var(--acc),var(--acc2));-webkit-background-clip:text;background-clip:text;color:transparent}
  header p{color:var(--dim);font-size:14px;margin-top:6px}

  .card{
    background:linear-gradient(180deg,var(--card2),var(--card));
    border:1px solid var(--line); border-radius:20px;
    padding:clamp(18px,3.5vw,28px);
    box-shadow:0 20px 50px rgba(0,0,0,.45), inset 0 1px 0 rgba(255,255,255,.04);
  }

  /* ---- output ---- */
  .out{
    position:relative; background:#0d1119; border:1px solid var(--line);
    border-radius:14px; padding:20px 18px 16px; margin-bottom:14px;
  }
  #pw{
    font-family:var(--mono); font-size:clamp(18px,3.4vw,26px); line-height:1.45;
    letter-spacing:.03em; word-break:break-all; min-height:1.4em; user-select:all;
  }
  #pw .d{color:#7ec8ff} #pw .s{color:#ff9e7a} /* digits / symbols tint */
  .outbtns{display:flex;gap:10px;margin-top:14px}
  button{
    font:inherit; cursor:pointer; border:none; border-radius:11px;
    padding:11px 18px; font-weight:600; font-size:14px;
    transition:transform .08s ease, filter .15s ease, background .15s ease;
    touch-action:manipulation;
  }
  button:active{transform:scale(.97)}
  .btn-copy{
    flex:1; color:#0b0e14;
    background:linear-gradient(90deg,var(--acc),var(--acc2));
    box-shadow:0 6px 18px rgba(110,168,255,.25);
  }
  .btn-copy:hover{filter:brightness(1.08)}
  .btn-copy.copied{background:var(--ok);box-shadow:0 6px 18px rgba(61,220,151,.3)}
  .btn-ghost{background:rgba(255,255,255,.07);color:var(--txt);border:1px solid var(--line)}
  .btn-ghost:hover{background:rgba(255,255,255,.12)}

  /* ---- strength ---- */
  .meter{margin:4px 2px 20px}
  .meter-top{display:flex;justify-content:space-between;align-items:baseline;font-size:13px;margin-bottom:7px}
  #s-label{font-weight:700}
  #s-bits{color:var(--dim);font-variant-numeric:tabular-nums}
  .bar{height:7px;border-radius:99px;background:rgba(255,255,255,.08);overflow:hidden}
  #s-fill{height:100%;width:0;border-radius:99px;transition:width .35s ease, background .35s ease}

  /* ---- controls ---- */
  .row{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:10px}
  .lbl{font-size:13px;font-weight:600;color:var(--dim);text-transform:uppercase;letter-spacing:.08em}
  .lenwrap{display:flex;align-items:center;gap:14px;margin-bottom:22px}
  input[type=range]{
    flex:1; appearance:none;-webkit-appearance:none; height:7px; border-radius:99px;
    background:linear-gradient(90deg,var(--acc) var(--pct,25%), rgba(255,255,255,.1) var(--pct,25%));
    outline:none;
  }
  input[type=range]::-webkit-slider-thumb{
    appearance:none;-webkit-appearance:none; width:24px;height:24px;border-radius:50%;
    background:#fff; border:3px solid var(--acc);
    box-shadow:0 2px 10px rgba(0,0,0,.5); cursor:grab;
  }
  input[type=range]::-moz-range-thumb{
    width:20px;height:20px;border-radius:50%;background:#fff;border:3px solid var(--acc);
    box-shadow:0 2px 10px rgba(0,0,0,.5);cursor:grab;
  }
  input[type=number]{
    width:74px; font:inherit; font-weight:700; font-size:16px; text-align:center;
    color:var(--txt); background:#0d1119; border:1px solid var(--line);
    border-radius:10px; padding:9px 4px; appearance:textfield;-moz-appearance:textfield;
  }
  input[type=number]:focus{outline:none;border-color:var(--acc)}

  .presets{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:22px}
  .preset{
    background:rgba(255,255,255,.05); border:1px solid var(--line); color:var(--dim);
    padding:10px 4px; font-size:13px; font-weight:600; border-radius:11px;
  }
  .preset:hover{background:rgba(255,255,255,.09);color:var(--txt)}
  .preset.on{
    background:linear-gradient(90deg,rgba(110,168,255,.18),rgba(155,123,255,.18));
    border-color:rgba(110,168,255,.55); color:var(--txt);
  }

  .toggles{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:6px}
  .tg{
    display:flex;align-items:center;gap:11px; padding:12px 14px;
    background:rgba(255,255,255,.04); border:1px solid var(--line); border-radius:12px;
    cursor:pointer; user-select:none; transition:background .15s;
  }
  .tg:hover{background:rgba(255,255,255,.07)}
  .tg input{display:none}
  .sw{
    width:38px;height:22px;border-radius:99px;background:rgba(255,255,255,.14);
    position:relative;flex-shrink:0;transition:background .18s;
  }
  .sw::after{
    content:"";position:absolute;top:3px;left:3px;width:16px;height:16px;border-radius:50%;
    background:#fff;transition:left .18s;box-shadow:0 1px 4px rgba(0,0,0,.4);
  }
  .tg input:checked + .sw{background:linear-gradient(90deg,var(--acc),var(--acc2))}
  .tg input:checked + .sw::after{left:19px}
  .tg .t{font-size:14px;font-weight:500}
  .tg .h{display:block;font-size:11.5px;color:var(--faint);font-family:var(--mono);margin-top:2px}
  .tg.wide{grid-column:1 / -1}

  .err{color:var(--bad);font-size:13px;margin-top:10px;display:none}

  /* ---- batch ---- */
  .batch-head{display:flex;justify-content:space-between;align-items:center;margin:26px 0 0}
  #batch{list-style:none;margin-top:12px;display:none;flex-direction:column;gap:8px}
  #batch.show{display:flex}
  #batch li{
    display:flex;align-items:center;gap:10px;
    background:#0d1119;border:1px solid var(--line);border-radius:11px;padding:11px 14px;
  }
  #batch code{font-family:var(--mono);font-size:14px;word-break:break-all;flex:1}
  #batch button{padding:6px 12px;font-size:12px;border-radius:8px}

  footer{margin-top:20px;color:var(--faint);font-size:12.5px;text-align:center;line-height:1.6}

  /* ---- test banner ---- */
  #testbanner{
    display:none; width:100%; max-width:640px; margin-bottom:20px;
    border-radius:14px; padding:16px 18px; font-family:var(--mono); font-size:13px;
    border:2px solid; white-space:pre-wrap;
  }
  #testbanner.pass{display:block;background:rgba(61,220,151,.12);border-color:var(--ok);color:var(--ok)}
  #testbanner.fail{display:block;background:rgba(255,107,129,.12);border-color:var(--bad);color:var(--bad)}
  #testbanner .big{font-size:18px;font-weight:700;font-family:var(--sans);margin-bottom:8px}
  #testbanner .line{display:block;line-height:1.7}

  @media (max-width:520px){
    .presets{grid-template-columns:repeat(2,1fr)}
    .toggles{grid-template-columns:1fr}
    .outbtns{flex-direction:column}
    .btn-ghost{width:100%}
  }
</style>
</head>
<body>

<div id="testbanner" role="status"></div>

<div class="wrap">
  <header>
    <h1><span class="k">Password</span> Generator</h1>
    <p>Cryptographically secure — generated locally, never leaves this page.</p>
  </header>

  <div class="card">
    <div class="out">
      <div id="pw" aria-live="polite"></div>
      <div class="outbtns">
        <button class="btn-copy" id="copyBtn">Copy</button>
        <button class="btn-ghost" id="genBtn" title="Regenerate">&#8635;&nbsp; Regenerate</button>
      </div>
    </div>

    <div class="meter">
      <div class="meter-top">
        <span id="s-label">—</span>
        <span id="s-bits">0 bits of entropy</span>
      </div>
      <div class="bar"><div id="s-fill"></div></div>
    </div>

    <div class="row">
      <span class="lbl">Length</span>
    </div>
    <div class="lenwrap">
      <input type="range" id="lenRange" min="4" max="64" value="16" aria-label="Password length slider">
      <input type="number" id="lenNum" min="4" max="64" value="16" aria-label="Password length">
    </div>

    <div class="row"><span class="lbl">Quick presets</span></div>
    <div class="presets" id="presets">
      <button class="preset" data-preset="pin">PIN</button>
      <button class="preset" data-preset="letters">Letters</button>
      <button class="preset" data-preset="alnum">Alphanumeric</button>
      <button class="preset on" data-preset="full">+ Symbols</button>
    </div>

    <div class="row"><span class="lbl">Character sets</span></div>
    <div class="toggles">
      <label class="tg"><input type="checkbox" id="ck-lower" checked><span class="sw"></span>
        <span><span class="t">Lowercase</span><span class="h">a–z</span></span></label>
      <label class="tg"><input type="checkbox" id="ck-upper" checked><span class="sw"></span>
        <span><span class="t">Uppercase</span><span class="h">A–Z</span></span></label>
      <label class="tg"><input type="checkbox" id="ck-digits" checked><span class="sw"></span>
        <span><span class="t">Digits</span><span class="h">0–9</span></span></label>
      <label class="tg"><input type="checkbox" id="ck-symbols" checked><span class="sw"></span>
        <span><span class="t">Symbols</span><span class="h">!@#$%…</span></span></label>
      <label class="tg wide"><input type="checkbox" id="ck-noamb"><span class="sw"></span>
        <span><span class="t">Exclude ambiguous characters</span><span class="h">0 O 1 l I |</span></span></label>
    </div>
    <div class="err" id="err">Enable at least one character set.</div>

    <div class="batch-head">
      <span class="lbl">Need a few?</span>
      <button class="btn-ghost" id="batchBtn">Generate 5</button>
    </div>
    <ul id="batch"></ul>
  </div>

  <footer>Uses <code>crypto.getRandomValues</code> with rejection sampling — no modulo bias, no <code>Math.random</code>.</footer>
</div>

<script>
"use strict";
(function(){
  /* ---------------- character sets ---------------- */
  const SETS = {
    lower:   "abcdefghijklmnopqrstuvwxyz",
    upper:   "ABCDEFGHIJKLMNOPQRSTUVWXYZ",
    digits:  "0123456789",
    symbols: "!@#$%^&*()-_=+[]{};:,.<>?/~|"
  };
  const AMBIGUOUS = "0O1lI|";

  /* ------------- unbiased secure random ------------- */
  // Random integer in [0, max) via rejection sampling — no modulo bias.
  function randInt(max){
    if (max <= 0) throw new Error("randInt: max must be > 0");
    const limit = Math.floor(0x100000000 / max) * max; // largest multiple of max <= 2^32
    const buf = new Uint32Array(1);
    let v;
    do { crypto.getRandomValues(buf); v = buf[0]; } while (v >= limit);
    return v % max;
  }
  function pick(str){ return str[randInt(str.length)]; }
  function shuffle(arr){ // Fisher–Yates with secure randInt
    for (let i = arr.length - 1; i > 0; i--){
      const j = randInt(i + 1);
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
  }

  /* ---------------- generation ---------------- */
  function activeSets(opts){
    const out = [];
    for (const k of ["lower","upper","digits","symbols"]){
      if (!opts[k]) continue;
      let s = SETS[k];
      if (opts.noAmbiguous) s = [...s].filter(c => !AMBIGUOUS.includes(c)).join("");
      if (s.length) out.push(s);
    }
    return out;
  }

  function generate(opts){
    const sets = activeSets(opts);
    if (!sets.length) return null;
    const pool = sets.join("");
    const len = opts.length;
    const chars = [];
    // Guarantee at least one char from each enabled set when length allows.
    if (len >= sets.length) for (const s of sets) chars.push(pick(s));
    while (chars.length < len) chars.push(pick(pool));
    chars.length = len; // (guard: if len < sets.length, trim)
    return shuffle(chars).join("");
  }

  function entropyBits(opts){
    const sets = activeSets(opts);
    if (!sets.length) return 0;
    const poolSize = sets.join("").length;
    return opts.length * Math.log2(poolSize);
  }

  /* ---------------- UI state ---------------- */
  const $ = id => document.getElementById(id);
  const lenRange = $("lenRange"), lenNum = $("lenNum"),
        pwEl = $("pw"), copyBtn = $("copyBtn"), genBtn = $("genBtn"),
        sLabel = $("s-label"), sBits = $("s-bits"), sFill = $("s-fill"),
        errEl = $("err"), batchBtn = $("batchBtn"), batchEl = $("batch");
  const cks = { lower:$("ck-lower"), upper:$("ck-upper"),
                digits:$("ck-digits"), symbols:$("ck-symbols"), noamb:$("ck-noamb") };
  let current = "";

  function readOpts(){
    return {
      length: clampLen(+lenNum.value),
      lower: cks.lower.checked, upper: cks.upper.checked,
      digits: cks.digits.checked, symbols: cks.symbols.checked,
      noAmbiguous: cks.noamb.checked
    };
  }
  function clampLen(v){ return Math.min(64, Math.max(4, Math.round(v) || 16)); }

  function renderPw(pw){
    pwEl.textContent = "";
    for (const c of pw){
      const span = document.createElement("span");
      if (/[0-9]/.test(c)) span.className = "d";
      else if (!/[a-zA-Z]/.test(c)) span.className = "s";
      span.textContent = c;
      pwEl.appendChild(span);
    }
  }

  function strengthInfo(bits){
    if (bits < 35)  return ["Weak",        "var(--bad)",  Math.max(6, bits/128*100)];
    if (bits < 60)  return ["Fair",        "var(--warn)", bits/128*100];
    if (bits < 100) return ["Strong",      "var(--acc)",  bits/128*100];
    return ["Very strong", "var(--ok)", Math.min(100, bits/128*100)];
  }

  function refresh(){
    const opts = readOpts();
    const pw = generate(opts);
    if (pw === null){
      errEl.style.display = "block";
      pwEl.textContent = "—";
      current = "";
      sLabel.textContent = "—"; sLabel.style.color = "var(--dim)";
      sBits.textContent = "0 bits of entropy";
      sFill.style.width = "0";
      return;
    }
    errEl.style.display = "none";
    current = pw;
    renderPw(pw);
    const bits = entropyBits(opts);
    const [label, color, pct] = strengthInfo(bits);
    sLabel.textContent = label; sLabel.style.color = color;
    sBits.textContent = bits.toFixed(1) + " bits of entropy";
    sFill.style.width = pct + "%"; sFill.style.background = color;
    copyBtn.textContent = "Copy"; copyBtn.classList.remove("copied");
  }

  /* ---- length sync ---- */
  function setLen(v, from){
    v = clampLen(v);
    if (from !== "num") lenNum.value = v;
    if (from !== "range") lenRange.value = v;
    lenRange.style.setProperty("--pct", ((v-4)/(64-4)*100) + "%");
    refresh();
  }
  lenRange.addEventListener("input", () => setLen(+lenRange.value, "range"));
  lenNum.addEventListener("input", () => { if (lenNum.value !== "") setLen(+lenNum.value, "num"); });
  lenNum.addEventListener("blur", () => setLen(+lenNum.value));

  /* ---- presets ---- */
  const PRESETS = {
    pin:     { lower:false, upper:false, digits:true,  symbols:false },
    letters: { lower:true,  upper:true,  digits:false, symbols:false },
    alnum:   { lower:true,  upper:true,  digits:true,  symbols:false },
    full:    { lower:true,  upper:true,  digits:true,  symbols:true  }
  };
  function applyPreset(name){
    const p = PRESETS[name];
    cks.lower.checked = p.lower; cks.upper.checked = p.upper;
    cks.digits.checked = p.digits; cks.symbols.checked = p.symbols;
    markPreset();
    refresh();
  }
  function markPreset(){
    // highlight whichever preset matches current toggles (if any)
    const cur = { lower:cks.lower.checked, upper:cks.upper.checked,
                  digits:cks.digits.checked, symbols:cks.symbols.checked };
    document.querySelectorAll(".preset").forEach(b => {
      const p = PRESETS[b.dataset.preset];
      const match = ["lower","upper","digits","symbols"].every(k => p[k] === cur[k]);
      b.classList.toggle("on", match);
    });
  }
  document.querySelectorAll(".preset").forEach(b =>
    b.addEventListener("click", () => applyPreset(b.dataset.preset)));
  for (const k of ["lower","upper","digits","symbols","noamb"])
    cks[k].addEventListener("change", () => { markPreset(); refresh(); });

  /* ---- copy / regenerate ---- */
  function copyText(text, btn){
    const done = ok => {
      if (!ok) return;
      btn.textContent = "Copied ✓"; btn.classList.add("copied");
      setTimeout(() => { btn.textContent = "Copy"; btn.classList.remove("copied"); }, 1400);
    };
    if (navigator.clipboard && navigator.clipboard.writeText){
      navigator.clipboard.writeText(text).then(() => done(true)).catch(() => done(fallbackCopy(text)));
    } else done(fallbackCopy(text));
  }
  function fallbackCopy(text){
    const ta = document.createElement("textarea");
    ta.value = text; ta.style.position = "fixed"; ta.style.opacity = "0";
    document.body.appendChild(ta); ta.select();
    let ok = false;
    try { ok = document.execCommand("copy"); } catch(e){}
    ta.remove();
    return ok;
  }
  copyBtn.addEventListener("click", () => { if (current) copyText(current, copyBtn); });
  genBtn.addEventListener("click", refresh);

  /* ---- batch ---- */
  batchBtn.addEventListener("click", () => {
    const opts = readOpts();
    batchEl.textContent = "";
    for (let i = 0; i < 5; i++){
      const pw = generate(opts);
      if (pw === null) break;
      const li = document.createElement("li");
      const code = document.createElement("code"); code.textContent = pw;
      const btn = document.createElement("button"); btn.className = "btn-ghost"; btn.textContent = "Copy";
      btn.addEventListener("click", () => copyText(pw, btn));
      li.appendChild(code); li.appendChild(btn);
      batchEl.appendChild(li);
    }
    batchEl.classList.add("show");
  });

  /* ---- init ---- */
  setLen(16);

  /* ================= self-tests (?test) ================= */
  if (new URLSearchParams(location.search).has("test")){
    const results = [];
    const assert = (name, fn) => {
      try { const r = fn(); results.push([name, r === true, r === true ? "" : String(r)]); }
      catch(e){ results.push([name, false, e.message]); }
    };
    const opts = (o) => Object.assign(
      { length:16, lower:true, upper:true, digits:true, symbols:true, noAmbiguous:false }, o);

    assert("length matches setting (4, 12, 33, 64)", () => {
      for (const L of [4, 12, 33, 64]){
        const pw = generate(opts({ length:L }));
        if (pw.length !== L) return `length ${L} produced ${pw.length}`;
      }
      return true;
    });

    assert("numeric preset yields digits only", () => {
      for (let i = 0; i < 30; i++){
        const pw = generate(opts({ lower:false, upper:false, symbols:false, length:8 }));
        if (!/^[0-9]+$/.test(pw)) return `non-digit in "${pw}"`;
      }
      return true;
    });

    assert("alphanumeric yields only [A-Za-z0-9]", () => {
      for (let i = 0; i < 30; i++){
        const pw = generate(opts({ symbols:false, length:20 }));
        if (!/^[A-Za-z0-9]+$/.test(pw)) return `bad char in "${pw}"`;
      }
      return true;
    });

    assert("symbols preset includes >=1 symbol over trials", () => {
      for (let i = 0; i < 20; i++){
        const pw = generate(opts({ length:12 }));
        if (!/[^A-Za-z0-9]/.test(pw)) return `no symbol in "${pw}"`;
      }
      return true;
    });

    assert("exclude-ambiguous never emits 0O1lI|", () => {
      for (let i = 0; i < 60; i++){
        const pw = generate(opts({ noAmbiguous:true, length:24 }));
        for (const c of pw) if (AMBIGUOUS.includes(c)) return `ambiguous "${c}" in "${pw}"`;
      }
      return true;
    });

    assert("each enabled charset represented", () => {
      for (let i = 0; i < 30; i++){
        const pw = generate(opts({ length:8 }));
        if (!/[a-z]/.test(pw)) return `no lowercase in "${pw}"`;
        if (!/[A-Z]/.test(pw)) return `no uppercase in "${pw}"`;
        if (!/[0-9]/.test(pw)) return `no digit in "${pw}"`;
        if (!/[^A-Za-z0-9]/.test(pw)) return `no symbol in "${pw}"`;
      }
      return true;
    });

    assert("two consecutive generations differ", () => {
      const a = generate(opts({ length:24 })), b = generate(opts({ length:24 }));
      return a !== b || `both were "${a}"`;
    });

    const allPass = results.every(r => r[1]);
    const banner = document.getElementById("testbanner");
    banner.className = allPass ? "pass" : "fail";
    const head = document.createElement("div");
    head.className = "big";
    head.textContent = allPass ? "TESTS: PASS" : "TESTS: FAIL";
    banner.appendChild(head);
    for (const [name, ok, msg] of results){
      const line = document.createElement("span");
      line.className = "line";
      line.textContent = (ok ? "PASS  " : "FAIL  ") + name + (msg ? " — " + msg : "");
      banner.appendChild(line);
    }
    banner.setAttribute("data-test-status", allPass ? "PASS" : "FAIL");
    document.title = (allPass ? "PASS" : "FAIL") + " — Password Generator";
  }
})();
</script>
<script>
/* anonymous visit beacon — counts loads + presence heartbeats, no cookies */
(function(){
  if (location.protocol === "file:" || location.hostname === "localhost") return;
  var EP = "https://site-analytics.vaibhavpro9210.workers.dev/ping";
  var sid = sessionStorage.getItem("va_sid");
  if (!sid) { sid = Math.random().toString(36).slice(2) + Date.now().toString(36); sessionStorage.setItem("va_sid", sid); }
  function send(kind){
    try { navigator.sendBeacon(EP, new Blob([JSON.stringify({sid:sid, page:location.pathname, kind:kind})], {type:"text/plain"})); } catch(e){}
  }
  send("load");
  setInterval(function(){ if (document.visibilityState === "visible") send("beat"); }, 60000);
})();
</script>
